services:
  beijingshiye-tender-text-parse:
    build:
      context: .
      dockerfile: Dockerfile
    image: beijingshiye-tender-text-parse:latest
    container_name: beijingshiye-tender-text-parse
    ports:
      - "6715:26715"
    env_file:
      - .env
    volumes:
      # 本地持久化：SQLite 数据库目录
      - ./data:/app/data
      # 本地持久化：日志文件目录
      - ./logs:/app/logs
    restart: unless-stopped
